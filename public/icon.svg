<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#08090d"/>

  <!-- Outer glow ring -->
  <rect x="4" y="4" width="504" height="504" rx="110" stroke="url(#ring)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d5ff5f"/>
      <stop offset="100%" stop-color="#52e0d6"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="128" y1="160" x2="384" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2235"/>
      <stop offset="100%" stop-color="#0d1422"/>
    </linearGradient>
    <linearGradient id="limeGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d5ff5f"/>
      <stop offset="100%" stop-color="#52e0d6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="ambientLeft" cx="30%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#52e0d6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#52e0d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientRight" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#d5ff5f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d5ff5f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow blobs -->
  <ellipse cx="154" cy="358" rx="160" ry="140" fill="url(#ambientLeft)"/>
  <ellipse cx="384" cy="128" rx="150" ry="130" fill="url(#ambientRight)"/>

  <!-- TV screen body -->
  <rect x="96" y="152" width="320" height="208" rx="20" fill="url(#screenGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Screen inner bezel -->
  <rect x="108" y="164" width="296" height="184" rx="14" fill="#050609" opacity="0.9"/>

  <!-- Scanline shimmer on screen -->
  <rect x="108" y="164" width="296" height="3" rx="1" fill="white" opacity="0.04"/>
  <rect x="108" y="174" width="296" height="2" rx="1" fill="white" opacity="0.03"/>

  <!-- Play button triangle — centered on screen -->
  <g filter="url(#glow)">
    <polygon points="224,222 224,290 296,256" fill="url(#limeGrad)" opacity="0.95"/>
  </g>

  <!-- LIVE badge — top-right of screen -->
  <rect x="318" y="176" width="72" height="24" rx="6" fill="#ff4f6d" opacity="0.92"/>
  <circle cx="330" cy="188" r="4" fill="white" opacity="0.9"/>
  <text x="340" y="193" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="800" fill="white" letter-spacing="0.5">LIVE</text>

  <!-- TV stand neck -->
  <rect x="244" y="360" width="24" height="32" rx="4" fill="#1a2235"/>

  <!-- TV stand base -->
  <rect x="184" y="390" width="144" height="20" rx="8" fill="#1a2235"/>
  <rect x="184" y="390" width="144" height="2" rx="1" fill="url(#ring)" opacity="0.4"/>

  <!-- Bottom antenna dots (decorative) -->
  <circle cx="196" cy="408" r="2" fill="#d5ff5f" opacity="0.5"/>
  <circle cx="316" cy="408" r="2" fill="#52e0d6" opacity="0.5"/>
</svg>
